name: Metrobus realtime

on:
  workflow_dispatch:
  schedule:
    # Lunes-viernes 06:17-17:17 hora CDMX aprox.
    - cron: "17 12-23 * * 1-5"
    # Lunes-viernes 18:17-22:17 hora CDMX aprox.
    - cron: "17 0-4 * * 2-6"

permissions:
  contents: write

concurrency:
  group: metrobus-realtime
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Extraer Metrobus realtime
        env:
          METROBUS_USER: ${{ secrets.METROBUS_USER }}
          METROBUS_PASS: ${{ secrets.METROBUS_PASS }}
        run: python -m historico_api source metrobus_realtime --config configs/tables.yml
      - name: Regenerar docs
        run: python -m historico_api docs --config configs/tables.yml
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs configs README.md
          if git diff --cached --quiet; then echo "Sin cambios."; exit 0; fi
          git commit -m "Actualiza Metrobus realtime"
          git pull --rebase
          git push
