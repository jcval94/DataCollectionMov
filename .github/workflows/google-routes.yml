name: Google Routes

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 1-5"

permissions:
  contents: write

concurrency:
  group: google-routes
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Extraer Google Routes
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MAPS: ${{ secrets.MAPS }}
        run: python -m historico_api source google_routes --config configs/tables.yml
      - run: python -m historico_api docs --config configs/tables.yml
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs configs README.md
          if git diff --cached --quiet; then echo "Sin cambios."; exit 0; fi
          git commit -m "Actualiza Google Routes"
          git pull --rebase
          git push
